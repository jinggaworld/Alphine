<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="50%" style="stop-color:#4285f4"/>
      <stop offset="100%" style="stop-color:#8ab4f8"/>
    </linearGradient>
    <linearGradient id="snow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8f0fe"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="10" y="10" width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Mountain peak -->
  <polygon points="60,28 32,82 88,82" fill="url(#snow)" opacity="0.95"/>

  <!-- Snow cap on peak -->
  <polygon points="60,28 50,46 70,46" fill="#ffffff"/>

  <!-- Left slope highlight -->
  <polygon points="60,28 32,82 46,82 60,50" fill="#ffffff" opacity="0.25"/>

  <!-- Shadow on right slope -->
  <polygon points="60,28 88,82 74,82 60,50" fill="#d2e3fc" opacity="0.5"/>

  <!-- Base shadow -->
  <rect x="32" y="78" width="56" height="6" rx="3" fill="#1557b0" opacity="0.3"/>
</svg>
